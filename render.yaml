services:
  - type: web
    name: rfp-extractor
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -e ".[openai,anthropic,gemini,server]"
    startCommand: python -c "from rfp_extractor.api import start; start()"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: LLM_PROVIDER
        value: gemini
      - key: LLM_MODEL
        value: gemini-3.5-flash
      - key: GEMINI_API_KEY
        sync: false
      - key: LLM_THINKING_LEVEL
        value: low
      - key: LOG_LEVEL
        value: info
